version: "3.8"

# 启动: docker compose up -d
# 停止: docker compose down
# 数据持久化于 ./.docker-data/ 已加入 .gitignore

services:
  mysql:
    image: mysql:8.0
    container_name: ai-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ai_admin_2026
      MYSQL_DATABASE: ai_admin
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - ./.docker-data/mysql:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pai_admin_2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ai-admin-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # 控制台 http://localhost:9001
    volumes:
      - ./.docker-data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 启动后自动创建 bucket=ai-admin 并设为可读
  minio-init:
    image: minio/mc:latest
    container_name: ai-admin-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/ai-admin || true &&
      mc anonymous set download local/ai-admin || true &&
      echo 'MinIO bucket ai-admin ready.';
      "
