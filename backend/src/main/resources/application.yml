# 通用配置（dev/prod 共用部分）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  profiles:
    active: dev
  application:
    name: ai-admin-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭详细 SQL 日志
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

# Sa-Token
sa-token:
  token-name: satoken
  timeout: 2592000          # token 30 天
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  is-read-cookie: false
  is-read-header: true

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# 业务自定义
ai-admin:
  glm:
    endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
    api-key: ${ZHIPUAPIKEY}
    model: GLM-4-Air-250414
    timeout-seconds: 30
  minio:
    endpoint: http://localhost:9000
    public-endpoint: http://localhost:9000
    access-key: ${MINIOACCESS}
    secret-key: ${MINIOSECRET}
    bucket: miniotest
    presigned-expiry-seconds: 7200
